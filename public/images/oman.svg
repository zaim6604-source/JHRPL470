<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ce1126"/>
      <stop offset="100%" style="stop-color:#009a49"/>
    </linearGradient>
    <pattern id="dots" patternUnits="userSpaceOnUse" width="20" height="20">
      <circle cx="10" cy="10" r="1.5" fill="rgba(255,255,255,.1)"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="url(#g)"/>
  <rect width="600" height="400" fill="url(#dots)"/>
  <rect x="0" y="0" width="600" height="400" fill="none"/>
  <text x="300" y="180" text-anchor="middle" fill="white" font-size="48" font-weight="bold" font-family="sans-serif">Oman</text>
  <text x="300" y="225" text-anchor="middle" fill="rgba(255,255,255,.8)" font-size="20" font-family="sans-serif">Muscat</text>
  <text x="300" y="280" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="14" font-family="sans-serif">Transport &amp; Hospitality</text>
